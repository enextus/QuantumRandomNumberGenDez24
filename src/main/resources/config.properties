# ============================================================================
# Quantum Random Number Generator
# Uses the Australian National University (ANU) Quantum Random Numbers API
# Official API endpoint and documentation:
# https://api.quantumnumbers.anu.edu.au
# https://quantumnumbers.anu.edu.au/documentation
# ============================================================================

# --- API Configuration ---

# Base URL of the ANU Quantum Random Numbers API (AWS-hosted endpoint)
api.url=https://api.quantumnumbers.anu.edu.au

# API access key used for authentication and quota tracking
# (Each key has request and bit limits defined by ANU)
# DO NOT put real keys here! Use environment variable QRNG_API_KEY or .env file
api.key=YOUR_API_KEY_HERE

# Data type requested from the API.
# uint16 means unsigned 16-bit integers in the range 0?65535
api.data.type=uint16

# Number of random values requested per API call
# Larger arrays reduce request overhead but increase payload size
api.array.length=1024

# Size of one logical data block (in array elements)
# Used for internal batching or processing granularity
api.block.size=2

# Maximum number of API requests allowed per session
# Trial plan: 100 requests/month, 1 request/second
api.max.requests=100

# Connection timeout (milliseconds):
# Maximum time to wait for establishing a TCP connection
api.connect.timeout=10000

# Read timeout (milliseconds):
# Maximum time to wait for the API response after connection is established
api.read.timeout=15000

# --- Random Number Buffer / Queue ---

# Minimum number of random values that should be buffered locally
# Triggers background refilling when the queue drops below this size
random.queue.min.size=100

# Minimum possible random value (inclusive)
# Must match the selected data type (uint16 ? 0)
random.min.value=0

# Maximum possible random value (inclusive)
# Must match the selected data type (uint16 ? 65535)
random.max.value=65535

# --- Panel (Visualization) Configuration ---

# Width of the drawing panel in pixels
panel.size.width=680

# Height of the drawing panel in pixels
panel.size.height=600

# Diameter (or side length) of a single drawn dot in pixels
dot.size=2

# --- Timer Configuration (milliseconds) ---

# Delay between timer ticks (controls update frequency)
# 150ms balances smooth animation with API quota conservation (Trial: 100 req/month)
timer.delay=150

# Number of dots generated and rendered per timer update
# 5 dots × 150ms = ~33 dots/sec → 1024 numbers last ~31 sec → 100 requests ≈ 51 min
dots.per.update=5

# --- Window Scaling ---

# Horizontal scaling factor applied to the application window
window.scale.width=1.5

# Vertical scaling factor applied to the application window
window.scale.height=1.1

# --- Column Display Settings ---

# Width of a single column in the numerical/text display (pixels)
# 52px fits 5-digit monospace numbers with right-alignment padding
column.width=52

# Height of a single row in the numerical/text display (pixels)
row.height=14

# Horizontal spacing between adjacent columns (pixels)
# Includes space for thin vertical separator line
column.spacing=8

# Maximum number of columns displayed simultaneously
max.columns=5

# --- Logging Configuration ---

# Log file name (relative or absolute path)
log.file.name=logs/app.log

# Logging verbosity level (e.g. DEBUG, INFO, WARN, ERROR)
log.level=INFO
